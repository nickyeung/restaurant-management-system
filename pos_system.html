<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System - 销售点系统 - 銷售點系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Calibri, "Segoe UI", Roboto, sans-serif; background: #fef9f3; }

        .language-toggle {
            position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; z-index: 100;
        }

        .lang-btn {
            padding: 8px 16px; border: 2px solid #ff6b35; background: white; color: #ff6b35;
            border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.3s;
        }

        .lang-btn.active { background: #ff6b35; color: white; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header {
            background: linear-gradient(135deg, #ff8c42 0%, #ff6b35 100%);
            color: white; padding: 30px; border-radius: 16px; margin-bottom: 30px; margin-top: 40px;
        }

        .header h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }

        .pos-container {
            display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;
        }

        .menu-section, .cart-section {
            background: white; padding: 20px; border-radius: 12px; border: 1px solid #ffe4d0;
        }

        .menu-section h2 { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 16px; }

        .menu-items {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px;
        }

        .menu-item {
            background: linear-gradient(135deg, #fff5ed 0%, #ffe4d0 100%);
            padding: 12px; border-radius: 8px; border: 1px solid #ff8c42; cursor: pointer;
            transition: all 0.3s; text-align: center;
        }

        .menu-item:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(255, 107, 53, 0.2); }

        .menu-item-icon { font-size: 24px; margin-bottom: 8px; }
        .menu-item-name { font-size: 12px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .menu-item-price { font-size: 14px; font-weight: 700; color: #ff6b35; font-family: Calibri, monospace; }

        .cart-section h2 { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 16px; }

        .cart-item {
            display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffe4d0;
            margin-bottom: 8px; font-size: 13px;
        }

        .cart-item-total { font-weight: 600; color: #ff6b35; font-family: Calibri, monospace; }

        .cart-summary {
            background: linear-gradient(135deg, #fff5ed 0%, #ffe4d0 100%);
            padding: 16px; border-radius: 8px; margin-top: 16px;
        }

        .summary-line {
            display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;
        }

        .summary-line strong { color: #ff6b35; font-family: Calibri, monospace; }

        .total-line {
            display: flex; justify-content: space-between; font-size: 16px; font-weight: 700;
            color: #ff6b35; border-top: 1px solid #ff8c42; padding-top: 8px; margin-top: 8px;
        }

        .pay-button {
            width: 100%; padding: 12px; background: #ff6b35; color: white; border: none;
            border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 12px; font-family: Calibri, sans-serif;
        }

        .pay-button:hover { background: #ff5520; }

        @media (max-width: 768px) {
            .pos-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button onclick="goBack()" style="position: fixed; top: 20px; left: 20px; padding: 8px 16px; border: 2px solid #ff6b35; background: white; color: #ff6b35; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; z-index: 999; transition: all 0.3s;">← Back</button>
    <div class="language-toggle">
        <button class="lang-btn active" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" onclick="setLanguage('zh')">简体中文</button>
        <button class="lang-btn" onclick="setLanguage('zh-tw')">繁體中文</button>
    </div>

    <div class="container">
        <div class="header">
            <h1 data-en="🍱 POS System" data-zh="🍱 销售点系统" data-zh-tw="🍱 銷售點系統">🍱 POS System</h1>
            <p data-en="Order and payment management" data-zh="订单和支付管理" data-zh-tw="訂單和支付管理">Order and payment management</p>
        </div>

        <div class="pos-container">
            <div class="menu-section">
                <h2 data-en="Menu" data-zh="菜单" data-zh-tw="菜單">Menu</h2>
                <div class="menu-items">
                    <div class="menu-item" onclick="addToCart('Fried Rice', 8.50, '🍚')">
                        <div class="menu-item-icon">🍚</div>
                        <div class="menu-item-name" data-en="Fried Rice" data-zh="炒饭" data-zh-tw="炒飯">Fried Rice</div>
                        <div class="menu-item-price">$8.50</div>
                    </div>
                    <div class="menu-item" onclick="addToCart('Chicken Soup', 6.50, '🍲')">
                        <div class="menu-item-icon">🍲</div>
                        <div class="menu-item-name" data-en="Chicken Soup" data-zh="鸡汤" data-zh-tw="雞湯">Chicken Soup</div>
                        <div class="menu-item-price">$6.50</div>
                    </div>
                    <div class="menu-item" onclick="addToCart('Dumplings', 7.00, '🥟')">
                        <div class="menu-item-icon">🥟</div>
                        <div class="menu-item-name" data-en="Dumplings" data-zh="饺子" data-zh-tw="餃子">Dumplings</div>
                        <div class="menu-item-price">$7.00</div>
                    </div>
                    <div class="menu-item" onclick="addToCart('Noodles', 6.00, '🍜')">
                        <div class="menu-item-icon">🍜</div>
                        <div class="menu-item-name" data-en="Noodles" data-zh="面条" data-zh-tw="麵條">Noodles</div>
                        <div class="menu-item-price">$6.00</div>
                    </div>
                </div>
            </div>

            <div class="cart-section">
                <h2 data-en="Cart" data-zh="购物车" data-zh-tw="購物車">Cart</h2>
                <div id="cart-items"></div>
                <div class="cart-summary">
                    <div class="summary-line">
                        <span data-en="Subtotal" data-zh="小计" data-zh-tw="小計">Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-line">
                        <span data-en="Tax (10%)" data-zh="税 (10%)" data-zh-tw="稅 (10%)">Tax (10%)</span>
                        <span id="tax">$0.00</span>
                    </div>
                    <div class="total-line">
                        <span data-en="Total" data-zh="总计" data-zh-tw="總計">Total</span>
                        <span id="total">$0.00</span>
                    </div>
                </div>
                <button class="pay-button" onclick="processPayment()" data-en="Process Payment" data-zh="处理支付" data-zh-tw="處理支付">Process Payment</button>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }
        let cartItems = [];
        let currentLanguage = 'en';

        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('[data-en]').forEach(el => {
                let text = '';
                if (lang === 'en') {
                    text = el.getAttribute('data-en');
                } else if (lang === 'zh') {
                    text = el.getAttribute('data-zh');
                } else if (lang === 'zh-tw') {
                    text = el.getAttribute('data-zh-tw');
                }
                if (text) el.textContent = text;
            });
        }

        function addToCart(name, price, icon) {
            cartItems.push({name, price, icon});
            updateCart();
        }

        function updateCart() {
            let html = '';
            cartItems.forEach((item, idx) => {
                html += `<div class="cart-item"><span>${item.icon} ${item.name}</span><span class="cart-item-total">$${item.price.toFixed(2)}</span></div>`;
            });
            document.getElementById('cart-items').innerHTML = html || '<p style="color: #999;">Cart is empty</p>';
            
            let subtotal = cartItems.reduce((sum, item) => sum + item.price, 0);
            let taxAmount = subtotal * 0.10;
            let total = subtotal + taxAmount;
            
            document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
            document.getElementById('tax').textContent = '$' + taxAmount.toFixed(2);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
        }

        function processPayment() {
            alert('Payment processed! Thank you for your order.');
            cartItems = [];
            updateCart();
        }
    </script>
</body>
</html>
